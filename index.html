<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklep App</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}
button {
    width: 80%;
    padding: 20px;
    margin: 5px;
    font-size: 20px;
    border-radius: 15px;
    border: none;
}
.plus { background: green; }
.minus { background: red; }
.list { background: gold; color: black; }

#reader { width: 300px; margin: auto; }

.card {
    background: #222;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

#scanner-container {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin: 20px auto;
}

#reader {
    width: 100%;
}

#torch-btn {
    position: fixed; /* 🔥 klíč */
    bottom: 120px;
    right: 20px;
    padding: 15px;
    font-size: 20px;
    border-radius: 50%;
    background: yellow;
    color: black;
    z-index: 999;
    display: none; /* 👈 defaultně skryté */
}
</style>
</head>

<body>

<h1>📦 Sklep</h1>

<button class="plus" onclick="startScan('add')">➕ Naskladnit</button>
<button class="minus" onclick="startScan('remove')">➖ Vyskladnit</button>
<button class="list" onclick="showList()">📋 Seznam</button>
<button onclick="exportExcel()">📤 Export Excel</button>

<div id="scanner-container">
    <div id="reader"></div>
    <button id="torch-btn" onclick="toggleTorch()">💡</button>
</div>

<div id="output"></div>

<script>
let torchOn = false;
let editMode = false;
let inventory = JSON.parse(localStorage.getItem("inventory") || "[]");
let lastScan = 0;
function toggleEdit() {
    editMode = !editMode;
    showList();
}

function save() {
    localStorage.setItem("inventory", JSON.stringify(inventory));
}

function toggleTorch() {
    const track = Quagga.CameraAccess.getActiveTrack();
    if (!track) return;

    torchOn = !torchOn;

    track.applyConstraints({
        advanced: [{ torch: torchOn }]
    });
}

function findProduct(code) {
    return inventory.find(p => p.barcode === code);
}

function addManual() {

    let name = prompt("Název produktu:");
    if (!name) return;

    let count = parseInt(prompt("Počet kusů:", "1")) || 1;
    let weight = prompt("Gramáž (volitelné):");

    inventory.push({
        name,
        barcode: "manual_" + Date.now(),
        count,
        weight
    });

    save();
    showList();
}

function editItem(index) {

    let p = inventory[index];

    let newName = prompt("Název:", p.name);
    if (!newName) return;

    let newCount = parseInt(prompt("Počet:", p.count));
    if (isNaN(newCount)) return;

    let newWeight = prompt("Gramáž:", p.weight || "");

    p.name = newName;
    p.count = newCount;
    p.weight = newWeight;

    save();
    showList();
}

function deleteItem(index) {

    if (!confirm("Opravdu smazat?")) return;

    inventory.splice(index, 1);

    save();
    showList();
}

function startScan(mode) {

    document.getElementById("scanner-container").style.display = "block";
    document.getElementById("torch-btn").style.display = "block";
    document.getElementById("output").innerHTML = "";
    document.getElementById("reader").innerHTML = "";

    Quagga.init({
        inputStream: {
            type: "LiveStream",
            target: document.querySelector("#reader"),
            constraints: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        },

        locator: {
            patchSize: "large",   // 🔥 zásadní
            halfSample: false     // 🔥 lepší kvalita
        },

        numOfWorkers: 2,
        frequency: 10,

        decoder: {
            readers: ["ean_reader"]
        },

        locate: true

    }, function(err) {
        if (err) {
            console.log(err);
            return;
        }
        Quagga.start();
    });

    Quagga.offDetected(); // 🔥 zabrání duplikátům

    Quagga.onDetected(function(result) {

        if (!result.codeResult || !result.codeResult.code) return;

        if (Date.now() - lastScan < 2000) return;
        lastScan = Date.now();

        let code = result.codeResult.code;

        Quagga.stop();

        document.getElementById("torch-btn").style.display = "none";

        document.getElementById("scanner-container").style.display = "none";

        handleScan(code, mode);
    });
}

function handleScan(code, mode) {

    let product = findProduct(code);

    if (product) {
        if (mode === "add") product.count++;
        else product.count = Math.max(0, product.count - 1);

        alert("✅ " + product.name + " | počet: " + product.count);
    } else {
        let name = prompt("Název produktu:");
        if (!name) return;

        let weight = prompt("Gramáž (volitelné):");

        inventory.push({
            name,
            barcode: code,
            count: 1,
            weight
        });

        alert("✅ Přidáno");
    }

    save();
}

function showList() {

    document.getElementById("reader").innerHTML = "";

    let html = `
        <h2>📋 Seznam</h2>
        <button onclick="toggleEdit()">
            ${editMode ? "✅ Hotovo" : "✏️ Edit"}
        </button>
        <button onclick="addManual()">➕ Přidat ručně</button>
    `;
    if (inventory.length === 0) {
        html += "<p>Žádné položky</p>";
    }

    inventory.forEach((p, index) => {
        html += `
        <div class="card">
            <b>${p.name}</b><br>
           Kusů: ${p.count}<br>
<button onclick="addOne(${index})">➕</button>
<button onclick="removeOne(${index})">➖</button>
            ${p.weight || ""}<br>
        `;

        if (editMode) {
            html += `
                <button onclick="editItem(${index})">✏️ Upravit</button>
                <button onclick="deleteItem(${index})">❌ Smazat</button>
            `;
        }

        html += `</div>`;
    });

    document.getElementById("output").innerHTML = html;
}function exportExcel() {

    let data = inventory.map(p => ({
        Nazev: p.name,
        Pocet: p.count,
        Kod: p.barcode,
        Gramaz: p.weight
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Inventar");

    XLSX.writeFile(wb, "inventar.xlsx");
}

function addOne(index) {
    inventory[index].count++;
    save();
    showList();
}

function removeOne(index) {
    inventory[index].count = Math.max(0, inventory[index].count - 1);
    save();
    showList();
}

window.addManual = addManual;
window.editItem = editItem;
window.deleteItem = deleteItem;
window.toggleEdit = toggleEdit;
window.addOne = addOne;
window.removeOne = removeOne;
window.toggleTorch = toggleTorch;

</script>

</body>
</html>
